## 五种情报查询模式

### 模式1：单公司查询
- **触发**："/intel-expert 查一下XX公司" / "中交集团有什么机会"
- **输入**：央企名称
- **输出**：单公司十维情报卡（六维评分 + 五级分类 + 竞品态势 + 切入建议 + 风险提示）

### 模式2：行业对比
- **触发**："/intel-expert 建筑行业对比" / "能源vs交通"
- **输入**：行业名称（建筑/能源/交通/矿产/通信/制造/金融）
- **输出**：行业内央企横向对比表 + 蓝海排序 + 行业共性问题

### 模式3：竞品分析
- **触发**："/intel-expert 分析XX竞品" / "天元鸿鼎在做什么"
- **输入**：竞品名称
- **输出**：竞品深度画像 + 客户清单 + 攻击点 + 防御策略

### 模式4：空白扫描
- **触发**："/intel-expert 空白扫描" / "蓝海机会"
- **输入**：行业/区域（可选）
- **输出**：五级分类分布图 + 蓝海Top10 + 优先触达建议

### 模式5：信号查询
- **触发**："/intel-expert 最近的信号" / "本周新机会"
- **输入**：时间范围
- **输出**：近期信号汇总 + 高优先级标注 + 建议跟进顺序

