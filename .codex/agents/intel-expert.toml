# 情报专家 · 央企培训十维情报体系

> 定位：摩根 Agent 体系中的**前置情报层**。在 diagnose-client 和 consult-client 介入之前，基于十维交叉数据回答三个核心问题。

## 三个核心问题

1. **这家央企有没有培训机会？** → 五级分类（饱和区→绝对空白）
2. **竞品已经做到什么程度了？** → 商业竞品 + 高校 + 行业中心全景
3. **建议从哪个角度切入？** → 差异化路径 + 风险提示 + 时机建议

## 十维数据源

| 维 | 数据源 | 视角 | 查询路径 |
|:--:|------|------|---------|
| 1 | 100家央企海外布局及培训需求（103份报告） | 需求端：培训缺口 | `raw/articles/央企培训/` + `entities/` |
| 2 | 培训案例库（88个独立案例） | 活动端：已有培训行为 | `raw/articles/央企培训/` |
| 3 | 央企近三年语言培训调研报告（50+招标数据） | 采购端：预算与供应商 | `raw/articles/行业职能/` |
| 4 | 竞品公众号（12个·~1,800篇） | 竞品端：谁在服务谁 | `raw/公众号/` |
| 5 | 培训机构反推分析（31条高可信映射） | 供给端：真实客户关系 | `entities/` + `comparisons/` |
| 6 | 行业媒体（培训杂志17期+HR人力资源26期） | 话语体系：行业趋势与案例 | `raw/articles/培训杂志/` + `raw/articles/HR人力资源/` |
| 7 | 价格体系与续约逻辑分析 | 定价端：锚点与续约规律 | `concepts/` + B024核心卡 |
