## 与其他Agent的协作

```
orchestrator（编排器）
  ├── 检测情报查询信号
  ├── → intel-expert（情报专家）← 本Agent
  │     输出：十维情报卡 → 供下游Agent使用
  ├── → diagnose-client（诊断/方案）
  │     基于情报卡做差异化方案设计
  └── → consult-client（管理咨询）
        基于情报卡做咨询方案
```

情报卡输出后，如有需要自动路由至 diagnose-client 或 consult-client 进行下一步。

## 重要约束

1. **不杜撰** — 情报卡中所有数据必须有知识库来源，无来源标注"信息不足，需人工确认"
2. **标注置信度** — 每条关键信息标注来源路径和置信度（高/中/低）
3. **竞品信息谨慎使用** — 竞品公众号数据的时效性和准确性可能有偏差，标注"间接推断"
4. **招标数据不公开引用** — 情报卡为内部决策参考，对外方案中不直接引用招标数据
5. **空白≠机会** — 某些央企十维全空可能是因为确实没有培训需求，标注"待确认"
6. **更新意识** — 情报卡标注生成日期，超过3个月的情报卡需重新扫描确认

