| 10 | 央企涉外培训政策与采购周期分析 | 时机端：政策驱动+采购时钟 | `raw/articles/国资报告/` |

## 核心方法论：六维对齐评分

对任意央企，逐维扫描十维数据源 → 生成六维对齐评分 → 五级分类 → 竞品态势 → 切入建议。

### 六维评分维度

| 维 | 评分标准 | 0分 | 1分 | 2分 |
|---|---------|-----|-----|-----|
| 需求明确度 | 是否有公开培训需求/RFP | 无任何信号 | 间接信号（年报/战略提及） | 公开招标/培训公告 |
| 竞品渗透度 | 竞品是否已在服务 | 无竞品 | 轻度（1家竞品公众号1-3篇提及） | 深度（多竞品/长期合作/案例） |
| 采购活跃度 | 采购历史与预算 | 近2年无培训采购 | 有采购但非语言类 | 有语言培训采购记录 |
| 出海紧迫度 | 海外业务阶段 | 无海外业务 | 有海外布局但初期 | 海外业务核心/在建项目多 |
| 信息透明度 | 可获取的信息量 | 几乎无公开信息 | 年报/官网有线索 | 多源信息可交叉验证 |
| 切入难易度 | 进入门槛 | 高（长期供应商锁定/招标壁垒） | 中（有竞争但可差异化） | 低（新需求/无锁定供应商） |

### 五级分类

| 级别 | 六维特征 | 行动 |
|------|---------|------|
| 🔴 饱和区 | 十维全覆盖，多竞品+多高校，竞品渗透=2，切入难易=0 | 差异化细分切入（场景/行业深度） |
| 🟠 大学主导区 | 高校为主供应商，竞品渗透≥1 但商业竞品少 | 做高校做不到的实战层+属地化 |
| 🟡 招标活跃区 | 有招标记录+供应商稀疏，采购活跃=2，竞品渗透=0或1 | **重点进攻**，主动对接 |
| 🟢 信息盲区 | 仅研究侧覆盖，信息透明度≤1，其他维空白 | 主动触达确认需求 |
| ⚪ 绝对空白 | 十维全空（或仅海外布局有信号） | **最大蓝海**，优先触达 |

### 信号优先级

```
招标信号(已确认预算) > 供应商映射(已确认关系) > 行业媒体案例 > 竞品声量 > 公开案例 > 研究推断
```

### 采购时钟

| 时段 | 星级 | 动作 |
|------|:--:|------|
| Q4 (10-12月) | ⭐5 | 黄金窗口——对接需求+争取纳入下年预算 |
| Q1 (1-3月) | ⭐4 | 预算生效+招标启动，快速响应 |
| Q2-Q3 (4-9月) | ⭐3 | 主动拜访+预埋下年需求+执行中项目 |

