<!-- CSS Skeleton for Course Brochure Builder
     Copy this into a new HTML file and fill in content.
     All CSS classes referenced in references/tool-patterns.md are defined here. -->
<style>
  :root {
    --navy: #1B2A4A; --navy-light: #263A5E; --gold: #C8963E; --gold-light: #D4A85C;
    --cream: #FAF8F5; --cream-dark: #F0EBE0; --white: #FFFFFF;
    --text: #2D3748; --text-light: #6B7B8F; --text-muted: #94A3B8; --red: #9B2C2C;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: #E6E2DA;
    display: flex; flex-direction: column; align-items: center;
    padding: 30px 20px; gap: 40px;
  }
  .page {
    width: 210mm; min-height: 297mm; background: var(--cream);
    box-shadow: 0 8px 40px rgba(27,42,74,0.18); position: relative; overflow: hidden; flex-shrink: 0;
  }
  /* Noise texture - apply to all cream pages */
  .page::before {
    content: ''; position: absolute; top:0;left:0;right:0;bottom:0;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.02'/%3E%3C/svg%3E");
    opacity: 0.5; pointer-events: none; z-index: 0;
  }
  .page > * { position: relative; z-index: 1; }

  /* ===== COVER & BACK ===== */
  .page-cover, .page-back { background: var(--navy); display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:50px; }
  .page-cover::before, .page-back::before { display:none; }

  /* ===== DIVIDER ===== */
  .divider-page { background: var(--navy); display:flex; align-items:center; justify-content:center; text-align:center; padding:50px; }
  .divider-page::before { display:none; }

  /* ===== CONTENT ===== */
  .inner-page { padding:45px 55px; display:flex; flex-direction:column; }
  .gold-rule { width:40px; height:3px; background:var(--gold); margin-bottom:16px; }
  .section-h1 { font-family:'Noto Serif SC',serif; font-size:26px; color:var(--navy); font-weight:700; letter-spacing:2px; margin-bottom:6px; }
  .section-h2 { font-family:'Noto Serif SC',serif; font-size:20px; color:var(--navy); font-weight:700; margin:22px 0 10px; padding-bottom:6px; border-bottom:2px solid var(--gold); display:inline-block; }
  .section-h3 { font-size:14px; color:var(--navy); font-weight:700; margin:14px 0 8px; letter-spacing:1px; }
  .body-text { font-size:12px; color:var(--text); line-height:1.8; }
  .body-text-sm { font-size:11px; color:var(--text-light); line-height:1.7; }
  .pull-quote { font-family:'Noto Serif SC',serif; font-size:14px; color:var(--gold); font-style:italic; padding-left:20px; border-left:2px solid var(--gold); margin:12px 0; line-height:1.7; }
  .star { color:var(--gold); letter-spacing:2px; font-size:13px; }
  .pn { position:absolute; bottom:20px; right:34px; font-family:'Playfair Display',serif; font-size:10px; color:rgba(0,0,0,0.12); letter-spacing:1px; }
  .pn-light { color:rgba(255,255,255,0.15); }

  /* ===== FORM ELEMENTS ===== */
  .form-sheet { background:var(--white); border:1px solid rgba(27,42,74,0.08); border-radius:4px; padding:22px 26px; margin:10px 0 16px; box-shadow:0 2px 8px rgba(0,0,0,0.03); }
  .form-sheet .form-title { font-family:'Noto Serif SC',serif; font-size:16px; font-weight:700; color:var(--navy); margin-bottom:4px; letter-spacing:1px; }
  .form-sheet .form-meta { font-size:10px; color:var(--text-muted); margin-bottom:14px; letter-spacing:1px; }
  .form-section-label { font-size:12px; font-weight:700; color:var(--navy); margin:14px 0 8px; padding-bottom:4px; border-bottom:1px solid rgba(200,150,62,0.3); letter-spacing:2px; }
  .form-row { display:flex; align-items:baseline; gap:10px; margin-bottom:6px; font-size:11px; }
  .fr-label { color:var(--navy); font-weight:500; min-width:120px; flex-shrink:0; }
  .fr-value { color:var(--text-light); border-bottom:1px dashed rgba(0,0,0,0.15); flex:1; min-width:60px; padding:2px 0; }
  .fr-tag { font-size:9px; color:var(--gold); background:rgba(200,150,62,0.08); padding:2px 8px; border-radius:2px; letter-spacing:1px; font-weight:500; }
  .form-check { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--text); margin-bottom:4px; }
  .form-check-box { width:14px; height:14px; border:1.5px solid var(--navy); border-radius:2px; flex-shrink:0; }

  /* ===== TABLE ===== */
  .tool-table { width:100%; border-collapse:collapse; font-size:11px; margin:8px 0; }
  .tool-table th { background:var(--navy); color:var(--white); padding:9px 12px; text-align:left; font-weight:500; font-size:10px; letter-spacing:1px; }
  .tool-table td { padding:8px 12px; border-bottom:1px solid rgba(27,42,74,0.05); vertical-align:top; color:var(--text); }
  .tool-table .cat-row td { background:rgba(200,150,62,0.06); font-weight:700; color:var(--navy); font-size:12px; letter-spacing:1px; padding:10px 12px; }
  .tt-num { color:var(--gold); font-weight:700; font-family:'Playfair Display',serif; font-size:13px; width:38px; }
  .tt-name { color:var(--navy); font-weight:500; }
  .tt-use { color:var(--text-light); font-size:10px; }

  /* ===== CARDS ===== */
  .scenario-card { padding:12px 16px; margin-bottom:8px; background:rgba(27,42,74,0.02); border-left:3px solid var(--navy); border-radius:0 3px 3px 0; font-size:11px; }
  .sc-num { font-family:'Playfair Display',serif; font-size:14px; color:var(--gold); font-weight:700; }
  .sc-title { font-weight:700; color:var(--navy); }
  .sc-body { color:var(--text-light); line-height:1.6; margin-top:4px; }
  .sop-level { padding:12px 16px; margin-bottom:6px; border-left:3px solid var(--navy); background:rgba(27,42,74,0.02); border-radius:0 3px 3px 0; font-size:11px; }
  .sl-name { font-weight:700; color:var(--navy); font-size:12px; }
  .sl-info { color:var(--text-light); line-height:1.6; margin-top:3px; }

  /* ===== FLOW & QUAD ===== */
  .flow-row { display:flex; align-items:center; gap:5px; flex-wrap:wrap; font-size:10px; margin:8px 0; }
  .flow-row .step { background:var(--navy); color:white; padding:5px 10px; border-radius:2px; letter-spacing:1px; white-space:nowrap; }
  .flow-row .arr { color:var(--gold); font-weight:700; }
  .quad-row { display:flex; gap:10px; margin:10px 0; }
  .quad-card { flex:1; padding:14px 16px; border-left:3px solid var(--navy); background:rgba(27,42,74,0.02); border-radius:0 3px 3px 0; font-size:10px; }
  .quad-card:nth-child(2){border-left-color:var(--navy-light)} .quad-card:nth-child(3){border-left-color:var(--gold)} .quad-card:nth-child(4){border-left-color:#B4783C}
  .quad-card h6 { font-size:13px; color:var(--navy); margin-bottom:4px; }
  .quad-card .stars { color:var(--gold); font-size:9px; letter-spacing:1px; margin-bottom:6px; }
  .quad-card dl { line-height:1.5; color:var(--text-light); } .quad-card dt { color:var(--navy); font-weight:700; display:inline; font-size:9px; } .quad-card dd { display:inline; margin:0; } .quad-card dd::after { content:''; display:block; margin-bottom:2px; }

  /* ===== TIMELINE ===== */
  .timeline-row { display:flex; gap:3px; margin:12px 0; }
  .tl-phase { flex:1; padding:12px 10px; font-size:9px; line-height:1.5; }
  .tl-phase:nth-child(1){background:#E8E0D5;border-radius:3px 0 0 3px} .tl-phase:nth-child(2){background:#DDE4ED} .tl-phase:nth-child(3){background:#D0DAE6} .tl-phase:nth-child(4){background:#C2D0DF} .tl-phase:nth-child(5){background:#D9CDB2;border-radius:0 3px 3px 0}
  .tl-phase h6 { font-size:10px; color:var(--navy); margin-bottom:3px; }
  .tlt { font-size:8px; color:var(--gold); letter-spacing:1px; }
  .tld { color:var(--text-light); } .tld b { color:var(--navy); }

  /* ===== ROADMAP ===== */
  .road-block { padding:18px 22px; color:white; margin-bottom:8px; border-radius:3px; position:relative; overflow:hidden; }
  .rb1{background:var(--navy)} .rb2{background:var(--navy-light)} .rb3{background:#2E5080}
  .rb-num { font-family:'Playfair Display',serif; font-size:50px; font-weight:900; position:absolute; right:20px; top:-8px; opacity:0.06; line-height:1; }
  .rb-header { display:flex; align-items:baseline; gap:10px; margin-bottom:4px; }
  .rbl { font-family:'Noto Serif SC',serif; font-size:16px; font-weight:700; color:var(--gold); }
  .rbt { font-size:10px; opacity:0.5; letter-spacing:1px; }
  .rb-goal { font-size:11px; font-style:italic; opacity:0.8; margin-bottom:8px; }
  .rb-items { font-size:10px; line-height:1.7; opacity:0.85; }
  .rb-effect { margin-top:10px; padding-top:8px; border-top:1px solid rgba(255,255,255,0.1); font-size:10px; color:var(--gold-light); font-weight:500; }
  .road-arrow-down { text-align:center; color:var(--gold); font-size:14px; padding:2px 0; }

  /* ===== DAY CARDS ===== */
  .day-cols { display:flex; gap:12px; margin:12px 0; }
  .day-card { flex:1; padding:14px 16px; border-top:3px solid var(--navy); background:var(--white); border-radius:0 0 3px 3px; font-size:10px; }
  .day-card:nth-child(2){border-top-color:var(--navy-light)} .day-card:nth-child(3){border-top-color:var(--gold)}
  .day-card h5 { font-size:13px; color:var(--navy); margin-bottom:6px; }
  .ag { color:var(--text-light); line-height:1.6; } .ag em { color:var(--navy); font-style:normal; font-weight:500; }
  .pr { margin-top:8px; padding-top:8px; border-top:1px solid rgba(0,0,0,0.05); color:var(--gold); font-weight:500; }

  /* ===== TOC ===== */
  .toc-item { display:flex; align-items:baseline; gap:12px; padding:8px 0; border-bottom:1px solid rgba(27,42,74,0.05); font-size:13px; }
  .toc-num { font-family:'Playfair Display',serif; font-size:16px; color:var(--gold); font-weight:700; min-width:28px; }
  .toc-title { color:var(--navy); font-weight:500; }
  .toc-desc { color:var(--text-muted); font-size:10px; margin-left:auto; }

  /* ===== ABOUT ===== */
  .about-page-dark { background:var(--navy); color:white; padding:50px 55px; display:flex; flex-direction:column; }
  .about-page-dark::before { display:none; }
  .about-page-dark h2 { font-family:'Noto Serif SC',serif; font-size:24px; color:var(--gold); letter-spacing:3px; margin-bottom:22px; }
  .about-cols { display:flex; gap:36px; flex:1; }
  .about-main { flex:1.3; font-size:13px; line-height:2; color:rgba(255,255,255,0.75); } .about-main strong { color:white; }
  .about-side { flex:0.7; } .about-side h5 { font-size:11px; letter-spacing:3px; color:var(--gold); margin-bottom:12px; }
  .about-item { padding:7px 0; border-bottom:1px solid rgba(255,255,255,0.06); font-size:11px; color:rgba(255,255,255,0.6); display:flex; align-items:center; gap:8px; }
  .about-item::before { content:''; width:5px; height:5px; background:var(--gold); border-radius:50%; flex-shrink:0; }
  .about-kw { margin-top:24px; padding-top:18px; border-top:1px solid rgba(255,255,255,0.08); font-size:10px; color:var(--gold-light); letter-spacing:2px; }

  @media print {
    body { background:white; padding:0; gap:0; }
    .page { box-shadow:none; page-break-after:always; width:210mm; min-height:297mm; }
    .page:last-child { page-break-after:avoid; }
    .page::before { display:none; }
  }
  @page { size: A4; margin: 0; }
</style>
